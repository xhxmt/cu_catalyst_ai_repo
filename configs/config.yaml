defaults:
  - data: demo
  - features: baseline
  - model: rf
  - cv: kfold5
  - target: co_adsorption_energy_ev_v1
  - _self_

project:
  seed: 42
  target_col: adsorption_energy
  id_col: catalyst_id

# Default task runs the full baseline pipeline end-to-end.
# Individual stages can still be run by passing task=<stage> on the CLI.
task: baseline

paths:
  raw_dir: data/raw
  interim_dir: data/interim
  processed_dir: data/processed
  reports_dir: reports
  figures_dir: reports/figures
  tables_dir: reports/tables
  models_dir: reports/models
  dft_dir: data/external/dft
  # --- Final output files (all model-prefixed, Hydra-interpolated) ---
  metrics_output: ${paths.tables_dir}/${model.name}_metrics.csv
  predictions_output: ${paths.tables_dir}/${model.name}_predictions.csv
  model_output: ${paths.models_dir}/${model.name}.joblib
  explanation_output: ${paths.tables_dir}/${model.name}_feature_importance.csv
  parity_output: ${paths.figures_dir}/${model.name}_parity.png
  learning_curve_output: ${paths.figures_dir}/${model.name}_learning_curve.png
  importance_plot_output: ${paths.figures_dir}/${model.name}_importance.png
  report_output: ${paths.reports_dir}/${model.name}_summary.md

data:
  # Source-specific keys (source_name, n_samples, *_output paths) live in the
  # data group files (configs/data/*.yaml) so that switching groups (data=real_table)
  # actually takes effect.  Only truly global, non-source-specific defaults stay here.
  mp_collection: materials/summary

features:
  use_columns:
    - coordination_number
    - avg_neighbor_distance
    - electronegativity
    - d_band_center
    - surface_energy
    - facet
  categorical_columns:
    - facet

model:
  name: rf
  random_state: 42
  params: {}

cv:
  n_splits: 5
  shuffle: true
  random_state: 42

