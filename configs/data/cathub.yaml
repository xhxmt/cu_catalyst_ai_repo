source_name: cathub
n_samples: null  # not used for cathub source; kept for interface symmetry

# --- API settings ---
api_url: https://api.catalysis-hub.org/graphql

# Elements to fetch.  Each element is queried separately and the results
# are concatenated.  Remove elements you do not need to reduce fetch time.
target_elements:
  - Fe
  - Co
  - Ni
  - Cu
  - Ru
  - Rh
  - Pd
  - Ag
  - Ir
  - Pt
  - Au

# DFT functional filter.  Only reactions computed with this functional are
# kept.  Set to null to disable filtering (keeps all functionals).
# BEEF-vdW is the most common functional in CatHub for adsorption energies.
# NOTE: Set to null here to maximise sample count; DFT consistency is tracked
# via the provenance column and can be filtered post-hoc at the feature stage.
dft_functional_filter: null

# Query filter parameters forwarded to the GraphQL endpoint.
# surface_composition is set per-element by the fetch loop; override only
# reactants and first (page size) here.
query_filter:
  reactants: CO
  first: 50
# Delay (seconds) between consecutive pagination requests.
# Prevents 503 / rate-limit errors when fetching many pages.
# Each page fetches 'first' reactions; set to 0 to disable throttling.
page_delay: 3.0

# --- Outputs (written by fetch, consumed by clean) ---
raw_output: data/raw/cathub/cu_cathub_raw.parquet
cleaned_output: data/interim/cu_cathub_cleaned.parquet
processed_output: data/processed/cathub_model_table.parquet
review_output: data/interim/cu_cathub_review.parquet

# --- Target definition ---
# Must match a registered target in configs/target/.
target_definition: co_adsorption_energy_ev_v1
